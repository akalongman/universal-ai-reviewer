name: 'Universal AI Code Reviewer'
description: 'AI-powered code review for Pull Requests using Claude or Gemini'
author: 'akalongman'

inputs:
  ai_provider:
    description: 'The AI provider to use: anthropic or gemini'
    required: false
    default: 'anthropic'
  anthropic_api_key:
    description: 'Anthropic API Key (Required if using Claude)'
    required: false
  gemini_api_key:
    description: 'Gemini API Key (Required if using Gemini)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Generate Diff
      shell: bash
      run: |
        echo "Calculating diff for GitHub Pull Request..."
        # In GitHub Actions, the 'base_ref' is the target branch (e.g., main)
        git fetch origin ${{ github.base_ref }} --quiet
        git diff origin/${{ github.base_ref }}...HEAD > mr_diff.txt

    - name: Install Dependencies
      shell: bash
      run: pip install -q -r ${{ github.action_path }}/requirements.txt

    - name: Run AI Reviewer
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        AI_PROVIDER: ${{ inputs.ai_provider }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python ${{ github.action_path }}/reviewer/main.py
