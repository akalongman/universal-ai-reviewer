variables:
  GIT_DEPTH: 0
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

auto_ai_review:
  stage: review
  cache:
    key: "ai-review-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
      #- .venv/
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TITLE !~ /\[no-ai\]/i
  before_script:
    - rm -rf .venv
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
  script:
    - echo "Calculating diff between $CI_MERGE_REQUEST_TARGET_BRANCH_NAME and HEAD..."
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME --quiet
    - git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD > mr_diff.txt
    - git clone -q https://github.com/akalongman/universal-ai-reviewer.git _shared_tools
    - pip uninstall -y google-generativeai google-genai
    - pip install -r _shared_tools/requirements.txt
    - python _shared_tools/reviewer/main.py

  after_script:
    - echo "Cleaning up..."
    - rm -rf _shared_tools mr_diff.txt
